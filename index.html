<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff6fae" />
  <meta name="description" content="Pocket Bloom is an original virtual-pet game inspired by the joyful handheld toys of the 1990s." />
  <title>Pocket Bloom</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 15%,#fff6bc 0 8%,transparent 9%),radial-gradient(circle at 85% 22%,#c7f1ff 0 10%,transparent 11%),linear-gradient(145deg,#ffeaf4,#e9dcff 52%,#fff8cf);font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif;color:#3a2945}.loading{width:min(430px,100%);padding:40px 28px;border:2px solid rgba(255,255,255,.8);border-radius:34px;background:rgba(255,255,255,.7);box-shadow:0 28px 80px rgba(87,45,105,.2);backdrop-filter:blur(16px);text-align:center}.loading-egg{width:92px;height:116px;margin:0 auto 22px;border:7px solid #3a2945;border-radius:50% 50% 46% 46%;background:linear-gradient(145deg,#fffbe2 0 44%,#ffd8eb 45% 60%,#fffbe2 61%);box-shadow:inset 12px 10px rgba(255,255,255,.65),0 14px 0 rgba(58,41,69,.12);animation:wobble 1.05s ease-in-out infinite}.loading h1{margin:0;font-size:clamp(34px,9vw,52px);letter-spacing:-.055em}.loading p{margin:12px 0 0;font-weight:700;color:#765b81}@keyframes wobble{0%,100%{transform:rotate(-4deg) translateY(0)}50%{transform:rotate(5deg) translateY(-8px)}}@media(prefers-reduced-motion:reduce){.loading-egg{animation:none}}
  </style>
</head>
<body>
  <main class="loading" aria-live="polite">
    <div class="loading-egg" aria-hidden="true"></div>
    <h1>Pocket Bloom</h1>
    <p>Waking your tiny world…</p>
  </main>
  <script src="payload/1.js"></script>
  <script src="payload/2.js"></script>
  <script src="payload/3.js"></script>
  <script src="payload/4.js"></script>
  <script src="loader.js"></script>
</body>
</html>
